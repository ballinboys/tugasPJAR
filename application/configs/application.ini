[production]
;General application settings
phpSettings.display_startup_errors = 0
phpSettings.display_errors = 0

includePaths.plugins = APPLICATION_PATH "/plugins"
includePaths.helperPaths = APPLICATION_PATH "/helpers"
includePaths.library = APPLICATION_PATH "/../library"
bootstrap.path = APPLICATION_PATH "/Bootstrap.php"
bootstrap.class = "Bootstrap"

;Enable modules
resources.modules[] = ""

;Front controller settings
;resources.layout.layout = "dashboard"
;resources.layout.layoutPath = APPLICATION_PATH "/modules/default/layouts/scripts"

resources.frontController.controllerDirectory.default = APPLICATION_PATH "/modules/default/controllers"
resources.frontController.moduleDirectory = APPLICATION_PATH "/modules"
resources.frontController.defaultModule = "default"
resources.frontController.params.displayExceptions = 1
resources.frontController.params.prefixDefaultModule = 1

